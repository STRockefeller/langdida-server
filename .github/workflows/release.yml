name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.3"
          cache: true

      - name: Test
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: langdida-server-linux-x64
            goos: linux
            goarch: amd64
            cc: gcc
            package: ""
          - artifact: langdida-server-windows-x64.exe
            goos: windows
            goarch: amd64
            cc: x86_64-w64-mingw32-gcc
            package: gcc-mingw-w64-x86-64
          - artifact: langdida-server-windows-x86.exe
            goos: windows
            goarch: "386"
            cc: i686-w64-mingw32-gcc
            package: gcc-mingw-w64-i686

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.3"
          cache: true

      - name: Install Windows cross-compiler
        if: matrix.package != ''
        run: |
          sudo apt-get update
          sudo apt-get install --yes "${{ matrix.package }}"

      - name: Build ${{ matrix.artifact }}
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -trimpath -o "dist/${{ matrix.artifact }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --verify-tag
          --generate-notes
